verbosity = "normal" # debug | verbose | normal | quiet
console_color = "auto" # auto | always | never

# IPC (Unix domain socket)
ipc_socket_enabled = true
ipc_socket_mode = "/tmp/audiomason/"
ipc_socket_name_template = "am_patch.sock"

ipc_socket_cleanup_delay_success_s = 0
ipc_socket_cleanup_delay_failure_s = 0

ipc_socket_on_startup_exists = "fail"
ipc_socket_on_startup_wait_s = 0




[paths]
# Canonical (optional; runner may infer)
# repo_root = "/home/pi/audiomason2"
# patch_dir = "/home/pi/audiomason2/patches"

# Canonical (supported by runner; missing in your file)
# success_archive_name = "{repo}-{branch}.zip"
success_archive_name = "{repo}-{branch}_{issue}.zip"
# Placeholders for success_archive_name:
#   {repo}   - repository name
#   {branch} - current branch (or "detached")
#   {issue}  - issue id from CLI (fallback: "noissue")
#   {ts}     - HEAD committer time in UTC (YYYYMMDD_%H%M%S)
#
# Example:
# success_archive_name = "{repo}-{branch}-issue{issue}-{ts}.zip"

# Success archive destination directory:
#   patch_dir      - patches/ (default)
#   successful_dir - patches/successful/
# success_archive_dir = "patch_dir"

# Optional deterministic retention for success archives.
# Enable only when BOTH of these are set:
#   - success_archive_cleanup_glob_template (non-empty)
#   - success_archive_keep_count (> 0)
#
# Candidate selection is a glob in the selected destination directory and is sorted
# lexicographically by filename (mtime is not used). The newest archive created by the
# current run is never deleted.
success_archive_cleanup_glob_template = "audiomason2-main_*.zip"
success_archive_keep_count = 1




[git]
allow_push_fail = true
default_branch = "main"

# NOTE: present in your file; in the runner policy this is ignored.
# Fetch behavior is unconditional.
fetch_always = true

require_up_to_date = true

# Canonical (supported by runner; missing in your file)
enforce_main_branch = true


[workspace]
# NOTE: present in your file; not part of runner Policy surface (keep only if used elsewhere).
enabled = true
# NOTE: present in your file; not part of runner Policy surface (keep only if used elsewhere).
base = "local_head"

# Legacy alias (runner maps delete_on_success -> delete_workspace_on_success)
delete_on_success = true
# Canonical (supported by runner; missing in your file)
delete_workspace_on_success = true

# Canonical (supported by runner; missing in your file)
update_workspace = false
# Canonical (supported by runner; missing in your file)
soft_reset_workspace = false

# Canonical (supported by runner; missing in your file)
test_mode = false
# Canonical (supported by runner; missing in your file)
test_mode_isolate_patch_dir = true


[scope]
allow_outside_files = false
declared_untouched_fail = true
allow_declared_untouched = false

# Legacy alias (runner maps enforce_files_only -> enforce_allowed_files)
enforce_files_only = true
# Canonical (supported by runner; missing in your file)
enforce_allowed_files = true

no_op_fail = true

# Canonical (supported by runner; missing in your file)
allow_no_op = false


[gates]
# Legacy alias (runner maps order -> gates_order)
# order = []
# order = ["pytest"]
order = ["compile", "js", "biome", "typescript", "ruff", "pytest", "mypy", "monolith", "docs"]
# Canonical (supported by runner; missing in your file)
gates_order = ["compile", "js", "biome", "typescript", "ruff", "pytest", "mypy", "monolith", "docs"]

# Canonical (supported by runner; missing in your file)
run_all_tests = true

compile_check = true

# Canonical (supported by runner; missing in your file)
compile_targets = ["."]
compile_exclude = ["patches"]

ruff_autofix = true
# Canonical (supported by runner; missing in your file)
ruff_autofix_legalize_outside = false
ruff_format = true

pytest_use_venv = true

gate_biome_format = true
gate_biome_format_command = ["npx", "biome", "format", "--write", "."]

# Canonical (supported by runner; missing in your file)
gates_allow_fail = false
apply_failure_partial_gates_policy = "repair_only"
apply_failure_zero_gates_policy = "repair_only"

gates_skip_ruff = false
# Canonical (supported by runner; missing in your file)
gates_skip_pytest = false
gates_skip_mypy = false

gates_skip_js = false
gate_js_extensions = [".js"]
gate_js_command = ["node", "--check"]

gates_skip_biome = false
biome_autofix = true
biome_autofix_legalize_outside = true
gate_biome_fix_command = ["npm", "run", "lint:files:fix", "--"]
gate_biome_extensions = [".js", ".jsx", ".mjs", ".cjs", ".ts", ".tsx"]
gate_biome_command = ["npm", "run", "lint:files", "--"]

gates_skip_typescript = false
gate_typescript_extensions = [".js", ".ts", ".tsx", ".mts", ".cts", ".d.ts"]
gate_typescript_command = ["tsc", "--noEmit", "--pretty", "false", "--allowJs", "--checkJs", "--target", "ES2022", "--lib", "ES2022,DOM"]
gate_typescript_mode = "auto" # auto | always
gate_typescript_base_tsconfig = "tsconfig.json"
typescript_targets = [
    "plugins/import/ui/web/assets",
    "plugins/web_interface/ui/assets",
    "scripts/patchhub/static",
]


# Documentation gate (docs) - required updates when watched paths change
gates_skip_docs = true
gate_docs_include = ["src", "plugins"]
gate_docs_exclude = ["badguys", "patches"]
gate_docs_required_files = ["docs/changes.md", "docs/specification.md"]

gate_badguys_runner = "off"
gate_badguys_command = ["badguys/badguys.py", "-q", "--exclude=test_900_commit_push_timestamp"]
gate_badguys_cwd = "auto"
# Monolith (anti-monolith) gate
gates_skip_monolith = false
gate_monolith_enabled = true
gate_monolith_mode = "strict"
gate_monolith_scan_scope = "patch"
gate_monolith_extensions = [".py", ".js"]
gate_monolith_compute_fanin = true
gate_monolith_on_parse_error = "fail"

gate_monolith_large_loc = 900
gate_monolith_huge_loc = 1300

gate_monolith_large_allow_loc_increase = 20
gate_monolith_huge_allow_loc_increase = 0
gate_monolith_large_allow_exports_delta = 2
gate_monolith_huge_allow_exports_delta = 0
gate_monolith_large_allow_imports_delta = 1
gate_monolith_huge_allow_imports_delta = 0

gate_monolith_new_file_max_loc = 400
gate_monolith_new_file_max_exports = 25
gate_monolith_new_file_max_imports = 15

gate_monolith_hub_fanin_delta = 5
gate_monolith_hub_fanout_delta = 5
gate_monolith_hub_exports_delta_min = 3
gate_monolith_hub_loc_delta_min = 100

gate_monolith_crossarea_min_distinct_areas = 3

gate_monolith_catchall_basenames = ["utils.py", "common.py", "helpers.py", "misc.py"]
gate_monolith_catchall_dirs = ["utils", "common", "helpers", "misc"]
gate_monolith_catchall_allowlist = []


# Ownership areas (first match wins)
gate_monolith_areas_prefixes = [
  "src/audiomason/",
  "scripts/am_patch/",
  "plugins/",
  "tests/",
  "scripts/",
]

gate_monolith_areas_names = [
  "core",
  "runner",
  "plugins",
  "tests",
  "tooling",
]

gate_monolith_areas_dynamic = [
  "",
  "",
  "plugins.<name>",
  "",
  "",
]



[promotion]
# NOTE: present in your file; not part of runner Policy surface (keep only if used elsewhere).
mode = "copy_files"

fail_if_live_files_changed = true
live_changed_resolution = "fail"
commit_and_push = true

# Legacy alias (runner maps rollback_on_failure -> no_rollback by inversion)
rollback_on_failure = true
# Canonical (supported by runner; missing in your file)
no_rollback = false


[logging]
# NOTE: present in your file; not part of runner Policy surface (keep only if used elsewhere).
log_retention = 20
log_level= 'quiet'

[security]
